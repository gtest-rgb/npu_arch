# OPCode维度标签
# 用于标识场景涉及的操作类型

tags:
  - name: MATMUL
    description: 矩阵乘法操作（A_MUL_B, A_MULACC_B）
    related_passes:
      - AssignMemoryType
      - SplitK

  - name: VIEW
    description: 视图操作，创建数据的视图（大搬小）
    related_passes:
      - AssignMemoryType
      - MergeViewAssemble
      - RemoveRedundantReshape
      - RemoveUnalignedReshape

  - name: ASSEMBLE
    description: 组装操作，将多个Tensor组装成一个（小搬大）
    related_passes:
      - AssignMemoryType
      - MergeViewAssemble
      - InsertOpForViewAssemble

  - name: RESHAPE
    description: 重塑操作，改变Tensor形状
    related_passes:
      - RemoveRedundantReshape
      - SplitReshape
      - RemoveUnalignedReshape

  - name: COPY
    description: 数据搬运操作（L1_TO_L0A, L1_TO_L0B等）
    related_passes:
      - GenerateMoveOp
      - IntraSubgraphAdapter
      - ReduceCopyMerge

  - name: NOP
    description: 空操作，用于占位或同步
    related_passes:
      - SubgraphToFunction

  - name: LOOP
    description: 循环操作
    related_passes:
      - LoopUnroll
      - LoopaxesProc

  - name: REDUCE
    description: 归约操作
    related_passes:
      - AssignMemoryType

  - name: ELEMENTWISE
    description: 逐元素操作
    related_passes:
      - AutoCast
      - CommonOperationEliminate
