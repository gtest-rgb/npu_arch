# ============================================================================
# matmul.py — 矩阵乘法
# ============================================================================

matmul:
  description: "矩阵乘法 C = A @ B"
  category: cube
  opcodes:
    - opcode: OP_A_MUL_B
      condition: "C = A * B（默认情况）"
      core_type: AIC
    - opcode: OP_A_MULACC_B
      condition: "C += A * B（累加场景）"
      core_type: AIC
    - opcode: OP_A_MUL_BT
      condition: "C = A * B^T（B 转置）"
      core_type: AIC
    - opcode: OP_A_MULACC_BT
      condition: "C += A * B^T（B 转置累加）"
      core_type: AIC
    - opcode: OP_AT_MUL_B
      condition: "C = A^T * B（A 转置）"
      core_type: AIC
    - opcode: OP_AT_MUL_BT
      condition: "C = A^T * B^T（A、B 均转置）"
      core_type: AIC
  pipeline:
    - stage: copy_in_a
      opcode: OP_COPY_IN
      description: "输入 A: GM -> L1"
      direction: "GM -> L1"
      constraint_file: "move/copy_in.yaml"
    - stage: copy_in_b
      opcode: OP_COPY_IN
      description: "输入 B: GM -> L1"
      direction: "GM -> L1"
      constraint_file: "move/copy_in.yaml"
    - stage: load_a
      opcode: OP_L1_TO_L0A
      description: "输入 A: L1 -> L0A"
      direction: "L1 -> L0A"
      constraint_file: "move/copy_in.yaml"
    - stage: load_b
      opcode: OP_L1_TO_L0B
      description: "输入 B: L1 -> L0B"
      direction: "L1 -> L0B"
      constraint_file: "move/copy_in.yaml"
    - stage: mmad
      opcode: OP_A_MUL_B
      description: "矩阵乘法 C = A * B"
      direction: "L0A,L0B -> L0C"
      constraint_file: "cube/matmul.yaml"
    - stage: extract_c
      opcode: OP_L0C_COPY_OUT
      description: "输出 C: L0C -> L1"
      direction: "L0C -> L1"
      constraint_file: "move/copy_out.yaml"
    - stage: copy_out
      opcode: OP_COPY_OUT
      description: "输出 C: L1 -> GM"
      direction: "L1 -> GM"
      constraint_file: "move/copy_out.yaml"
  source: "python/pypto/op/matmul.py"

scaled_mm:
  description: "MX 矩阵乘法（FP8 量化） C = A @ B（带 scale tensor）"
  category: cube
  opcodes:
    - opcode: OP_A_MUL_B
      condition: "MX 指令（FP8 输入，内部处理 scale）"
      core_type: AIC
  pipeline:
    - stage: copy_in_a
      opcode: OP_COPY_IN
      description: "输入 A: GM -> L1"
      direction: "GM -> L1"
      constraint_file: "move/copy_in.yaml"
    - stage: copy_in_b
      opcode: OP_COPY_IN
      description: "输入 B: GM -> L1"
      direction: "GM -> L1"
      constraint_file: "move/copy_in.yaml"
    - stage: load_a
      opcode: OP_L1_TO_L0A
      description: "输入 A: L1 -> L0A"
      direction: "L1 -> L0A"
      constraint_file: "move/copy_in.yaml"
    - stage: load_b
      opcode: OP_L1_TO_L0B
      description: "输入 B: L1 -> L0B"
      direction: "L1 -> L0B"
      constraint_file: "move/copy_in.yaml"
    - stage: mmad
      opcode: OP_A_MUL_B
      description: "MX 矩阵乘法"
      direction: "L0A,L0B -> L0C"
      constraint_file: "cube/matmul.yaml"
    - stage: extract_c
      opcode: OP_L0C_COPY_OUT
      description: "输出 C: L0C -> L1"
      direction: "L0C -> L1"
      constraint_file: "move/copy_out.yaml"
    - stage: copy_out
      opcode: OP_COPY_OUT
      description: "输出 C: L1 -> GM"
      direction: "L1 -> GM"
      constraint_file: "move/copy_out.yaml"
  source: "python/pypto/op/matmul.py"

