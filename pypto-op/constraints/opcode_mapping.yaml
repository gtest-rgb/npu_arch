# Operation -> OP_CODE Pipeline 映射
# Layer 1: 高层 Operation API 到 OP_CODE 执行链路的映射
#
# 每个 operation 包含:
#   description: 中文描述
#   category: 对应 tileop_constraints 下的子目录名
#   opcodes: 该 Operation 可能用到的计算 OP_CODE 列表（含触发条件和执行核心）
#   pipeline: 完整执行链路（逻辑视图，实际代码生成可能融合或省略部分环节）
#   source: Python API 源文件

# ============================================================================
# math.py — 算术运算
# ============================================================================

add:
  description: "逐元素加法 C = A + B"
  category: vector
  opcodes:
    - opcode: OP_ADD
      condition: "两个 Tensor 相加"
      core_type: AIV
    - opcode: OP_ADD_BRC
      condition: "broadcast 标量加法"
      core_type: AIV
    - opcode: OP_ADDS
      condition: "立即数标量加法"
      core_type: AIV
  pipeline:
    - stage: copy_in
      opcode: OP_COPY_IN
      description: "输入: GM -> UB"
      direction: "GM -> UB"
      constraint_file: "move/copy_in.yaml"
    - stage: compute
      opcode: OP_ADD
      description: "逐元素加法"
      direction: "UB -> UB"
      constraint_file: "vector/elementwise.yaml"
    - stage: copy_out
      opcode: OP_COPY_OUT
      description: "输出: UB -> GM"
      direction: "UB -> GM"
      constraint_file: "move/copy_out.yaml"
  source: "python/pypto/op/math.py"

