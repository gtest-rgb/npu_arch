# 公共硬件常量
# 来源: framework/src/interface/tileop/tileop_common.h

hardware_constants:
  BLOCK_SIZE: 32
  BLOCK_NELEM_B16: 16
  BLOCK_NELEM_B32: 8
  MASK_LEN: 64
  REPEAT_MAX: 255
  REPEAT_STRIDE_MAX: 255
  DUP_REPEAT_STRIDE_MAX: 4095
  BLOCK_NUM_ONE_REPEAT: 8
  NBLOCK_PER_MASK_B16: 4
  REPEAT_BYTE: 256

alignment_rules:
  UB: 32
  L1: 32
  L0A: 32
  L0B: 32
  L0C: 32
  GM: 32

dtype_constraints:
  fp16:
    element_size: 2
    block_nelem: 16
  bf16:
    element_size: 2
    block_nelem: 16
  fp32:
    element_size: 4
    block_nelem: 8
  int8:
    element_size: 1
    block_nelem: 32

# Tag sets from framework/src/interface/operation/opcode.h
