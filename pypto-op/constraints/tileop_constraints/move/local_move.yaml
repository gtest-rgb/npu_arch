# =============================================================================
# Same-memory moves
# =============================================================================

OP_COPY_UB_TO_UB:
  description: "UB到UB的数据拷贝（Vector pipe）"
  calc_type: MOVE_LOCAL
  core_type: AIV
  tileop: "TileOp::Tvcopy"
  pipe: [PIPE_V, PIPE_V]
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: null
  operands:
    input:
      mem_type: [UB]
      layout:
        type: "任意"
        contiguous: false
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
    output:
      mem_type: [UB]
      layout:
        type: "与输入一致"
        contiguous: false
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
  hardware:
    block_size: 32
    elements_per_block:
      fp16: 16
      bf16: 16
      fp32: 8
  tile_shape:
    api: "set_vec_tile_shapes"
    constraints:
      - rule: "末尾轴大小 * element_size % 32 == 0"
        severity: error
        tileop_cause: "Vector指令要求每次读取的字节数为32的整数倍"
    recommended:
      - scenario: "通用拷贝"
        value: "末尾轴对齐到256Bytes"
        reasoning: "充分利用UB带宽"
  tags: [UNARY_OPS]
  notes: |
    - UB内部数据拷贝，使用Vector指令
    - 有excludeBufferReuse属性，输出缓冲区不可复用
    - 属于UNARY_OPS集合
  source: "opcode.cpp:714 RegisterCube"

