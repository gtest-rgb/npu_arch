# Local Move Operations: data transfer within on-chip memory (L1<->UB, L0C->UB, UB->UB, L1->L1)
# calc_type: MOVE_LOCAL, MOVE_OUT, MOVE_IN, or ELMWISE
# Source: framework/src/interface/operation/opcode.cpp
#   RegisterCube()   OP_L1_COPY_UB, OP_L0C_COPY_UB, OP_UB_COPY_L1, OP_UB_COPY_L1_ND,
#                   OP_L1_TO_L1, OP_L0C_TO_L1, OP_UB_COPY_ND2NZ  (lines 704-722)
#   RegisterVector() OP_COPY_UB_TO_UB  (line 714)

# =============================================================================
# L1 <-> UB cross-boundary moves
# =============================================================================

OP_L1_COPY_UB:
  description: "L1到UB的数据搬运（FIX pipe）"
  calc_type: MOVE_OUT
  core_type: AIC
  tileop: "TileOp::L1CopyUB"
  pipe: [PIPE_FIX, PIPE_FIX]
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: null
  operands:
    input:
      mem_type: [L1]
      layout:
        type: "ND"
        contiguous: true
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: 32
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
    output:
      mem_type: [UB]
      layout:
        type: "ND"
        contiguous: true
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: 32
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
  hardware:
    block_size: 32
    elements_per_block:
      fp16: 16
      bf16: 16
      fp32: 8
  tile_shape:
    api: null
    constraints:
      - rule: "总字节数 <= UB容量"
        severity: error
        tileop_cause: "UB物理容量限制"
    recommended:
      - scenario: "Cube结果搬运到UB"
        value: "控制在UB容量内"
        reasoning: "L1数据搬运到UB供Vector计算使用"
  tags: [CROSS_L1_UB_OPS]
  notes: |
    - L1 -> UB搬运，用于Cube结果传递给Vector计算
    - 属于CROSS_L1_UB_OPS
  source: "opcode.cpp:704 RegisterCube"

