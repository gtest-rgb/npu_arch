  pipe: [PIPE_MTE2, PIPE_MTE2]
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: supported
  operands:
    input:
      mem_type: [GM]
      layout:
        type: "ND/NZ"
        contiguous: true
        max_dims: 5
      stride:
        required: false
        constraints:
          - "内轴stride必须32B对齐"
      alignment:
        address: 32
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
    output:
      mem_type: [UB]
      layout:
        type: "与输入一致或NZ"
        contiguous: true
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: 32
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
  hardware:
    block_size: 32
    elements_per_block:
      fp16: 16
      bf16: 16
      fp32: 8
      int8: 32
  tile_shape:
    api: "set_vec_tile_shapes"
    constraints:
      - rule: "末尾轴C0 = 32 / sizeof(dtype)"
        severity: error
        tileop_cause: "BLOCK_SIZE=32，MTE2按32B block搬运"
      - rule: "内轴大小 <= 65535"
        severity: error
        tileop_cause: "ND格式内轴最大值"
      - rule: "总字节数 <= UB容量"
        severity: error
        tileop_cause: "UB物理容量限制"
    recommended:
      - scenario: "通用计算"
        value: "末尾轴对齐到32B，整体大小不超过UB容量"
        reasoning: "MTE2 DMA搬运，最小粒度32B"
  tags: [SUPPORT_DYNAMIC_UNALIGNED_OPS]
  notes: |
    - GM -> UB直接DMA搬运
    - 有excludeBufferReuse属性，输出缓冲区不可复用
    - 属于SUPPORT_DYNAMIC_UNALIGNED_OPS
