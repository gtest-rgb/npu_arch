# CopyIn Operations: GM -> L1/UB/L0A/L0B (calc_type=MOVE_IN or MOVE_LOCAL)
# Source: framework/src/interface/operation/opcode.cpp
#   RegisterCommon()       OP_COPY_IN, OP_RESHAPE_COPY_IN  (lines 820, 804)
#   RegisterVector()       OP_UB_COPY_IN, OP_TRANSPOSE_MOVEIN, OP_GATHER_IN_UB  (lines 525, 436, 552)
#   RegisterCube()         OP_L1_COPY_IN, OP_L1_COPY_IN_FRACTAL_Z, OP_L1_COPY_IN_DMA,
#                          OP_L1_COPY_IN_A_SCALE, OP_L1_COPY_IN_B_SCALE,
#                          OP_L1_TO_L0A, OP_L1_TO_L0B, OP_L1_TO_L0_AT, OP_L1_TO_L0_BT,
#                          OP_L1_COPY_IN_CONV, OP_GATHER_IN_L1  (lines 657-733)
#   RegisterDistribute()  OP_SHMEM_GET_GM2UB  (line 765)

# =============================================================================
# GM -> UB (PIPE_MTE2, AIV)
# =============================================================================

OP_COPY_IN:
  description: "GM到任意目标存储的通用数据搬入，由pass层决定具体TileOp"
  calc_type: MOVE_IN
  core_type: ANY
  tileop: null
  pipe: []
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: supported
  operands:
    input:
      mem_type: [GM]
      layout:
        type: "任意"
        contiguous: false
        max_dims: 5
      stride:
        required: false
        constraints:
          - "内轴stride必须32B对齐（ND格式）"
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
    output:
      mem_type: [GM, L1, UB, L0A, L0B, L0C]
      layout:
        type: "由pass层决定"
        contiguous: false
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
  hardware:
    block_size: 32
    elements_per_block:
      fp16: 16
      bf16: 16
      fp32: 8
      int8: 32
  tile_shape:
    api: "set_vec_tile_shapes"
    constraints:
      - rule: "末尾轴C0 = 32 / sizeof(dtype)"
        severity: error
        tileop_cause: "BLOCK_SIZE=32，MTE按32B block搬运"
      - rule: "内轴大小 <= 65535"
        severity: error
        tileop_cause: "ND格式内轴最大值"
    recommended:
      - scenario: "通用计算"
        value: "末尾轴C0对齐到32B，外轴尽量大以减少搬运次数"
        reasoning: "充分利用MTE带宽"
  tags: [SUPPORT_DYNAMIC_UNALIGNED_OPS]
  notes: |
    - 通用CopyIn，无具体TileOp实现，由pass层展开为具体操作
    - 有outputCombineAxis和excludeBufferReuse属性
    - 属于SUPPORT_DYNAMIC_UNALIGNED_OPS
  source: "opcode.cpp:820 RegisterCommon"

OP_UB_COPY_IN:
  description: "GM到UB的数据搬入（MTE2 DMA）"
