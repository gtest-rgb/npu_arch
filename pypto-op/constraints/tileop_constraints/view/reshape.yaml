OP_RESHAPE:
  description: "张量形状变换（纯元数据操作，无数据移动）"
  calc_type: OTHER
  core_type: ANY
  tileop: "TileOp::Treshape"
  pipe: [PIPE_V, PIPE_V]
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: supported
  operands:
    input:
      mem_type: []
      layout:
        type: "任意"
        contiguous: false
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
    output:
      mem_type: []
      layout:
        type: "与输入一致"
        contiguous: false
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
  hardware:
    mask_len: 64
    repeat_max: 255
    block_size: 32
  tile_shape:
    api: null
    constraints: []
    recommended: []
  tags: [SUPPORT_DYNAMIC_UNALIGNED_OPS]
  notes: |
    - 纯元数据操作，不移动数据
    - 输入输出元素总数必须相同
    - 有validShape属性
    - 不需要set_vec_tile_shapes
  source: "opcode.cpp:802 RegisterCommon"

