# Cube Convolution Operations: CONV and related ops on AIC
# Source: framework/src/interface/operation/opcode.cpp
#   RegisterCube()  (lines 622-638)
#
# Convolution ops are more complex than matmul due to ND->NZ format conversion,
# weight layout (fractal Z), and multiple sub-operations in the pipeline.
# The main CONV/CONV_ADD are high-level fused ops that internally manage
# the full pipeline: CopyIn -> Load2D/Load3D -> MMAD -> Extract.
#
# Conv sub-ops handle individual stages:
# - OP_L1_COPY_IN_CONV: GM -> L1 (feature map copy-in)
# - OP_LOAD3D_CONV: L1 -> L0A (img2col / 3D weight loading)
# - OP_LOAD2D_CONV: L1 -> L0B (2D weight loading)
# - OP_CUBE_CONV_D2S: Depth-to-space format conversion
# - OP_CUBE_CONCAT_C: L0C concatenation along C dimension

# =============================================================================
# OP_CONV: 2D Convolution (fused pipeline)
# =============================================================================

OP_CONV:
  description: "二维卷积，融合完整pipeline（CopyIn -> Load -> MMAD -> Extract）"
  calc_type: CONV
  core_type: AIC
  tileop: "CUBE_CONV"
  pipe: [PIPE_M, PIPE_M]
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: null
  operands:
    input:
      mem_type: []  # 内部管理，不直接暴露mem_type
      layout:
        type: "ND格式 -> NZ格式（内部转换）"
        contiguous: false
        max_dims: 4
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_batch: 1
        min_cin: 1
        min_h: 1
        min_w: 1
    weight:
      mem_type: []
      layout:
        type: "Fractal Z 格式"
        contiguous: true
        max_dims: 4
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_cout: 1
        min_cin: 1
        min_kh: 1
        min_kw: 1
    output:
      mem_type: []
      layout:
        type: "ND格式（内部从NZ转换）"
        contiguous: false
        max_dims: 4
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
  hardware:
    block_size: 32
    base_block_m: 16
    base_block_k: 16
    base_block_n: 16
    l0a_size_bytes: 1048576
    l0b_size_bytes: 1048576
    l0c_size_bytes: 2097152
  tile_shape:
    api: "set_cube_tile_shapes"
    api_params:
      - name: "m"
        type: "list[int]"
        description: "[mL0, mL1]，对应 (H*W) 维度"
      - name: "k"
        type: "list[int]"
        description: "[kL0, kL1, kL1b]，对应 Cin 维度"
      - name: "n"
        type: "list[int]"
        description: "[nL0, nL1]，对应 Cout 维度"
      - name: "enable_split_k"
        type: "bool"
        default: false
    constraints:
      - rule: "L0 <= L1 且 L1 % L0 == 0"
        severity: error
        tileop_cause: "L1 -> L0 整块搬运对齐要求"
      - rule: "M (H*W) % base_block_m(16) == 0"
        severity: error
        tileop_cause: "MMAD 按 16x16 block 处理，img2col后的M维对齐"
      - rule: "K (Cin) % base_block_k(16) == 0"
        severity: error
        tileop_cause: "L0A/L0B 加载粒度"
      - rule: "N (Cout) % base_block_n(16) == 0"
        severity: error
        tileop_cause: "L0C 输出粒度"
      - rule: "kL0 * sizeof(dtype) % 32 == 0"
        severity: error
        tileop_cause: "BLOCK_SIZE=32"
      - rule: "nL0 * sizeof(dtype) % 32 == 0"
        severity: error
        tileop_cause: "BLOCK_SIZE=32"
      - rule: "CeilAlign(mL0,16) * CeilAlign(kL0,16) * sizeof(dtype) <= L0A_size"
        severity: error
        tileop_cause: "L0A 物理容量（A3: 1MB），img2col后的feature map tile"
      - rule: "CeilAlign(nL0,16) * CeilAlign(kL0,16) * sizeof(dtype) <= L0B_size"
        severity: error
        tileop_cause: "L0B 物理容量（A3: 1MB），weight tile"
      - rule: "CeilAlign(mL0,16) * CeilAlign(nL0,16) * 4 <= L0C_size"
        severity: error
        tileop_cause: "L0C 物理容量（A3: 2MB），输出固定 FP32"
    recommended:
      - scenario: "通用 FP16 Conv2D"
        value: "M=[128,128], K=[64,256], N=[256,256]"
        reasoning: "与matmul相同的推荐起始值，根据实际feature map大小调整"
  tags: []
  notes: |
    - 融合操作，内部管理完整pipeline：L1_COPY_IN_CONV -> LOAD3D_CONV/LOAD2D_CONV -> MMAD -> L0C_COPY_OUT_CONV
    - 使用CONV专用属性：cin, cout, paddingLeft/Right, paddingTop/Bottom, strideh/stridew
    - 额外属性：hposX, hsteP, wposX, wstep, hoffsetY, woffsetY（步进控制）
    - 支持融合：reluType（ReLU激活）、hasBiasFlag（偏置）、eltMode（element-wise融合）
    - hasQuantPreVector/hasQuantPostVector（量化前后处理）
    - 不直接暴露mem_type，内部管理数据搬运
    - TODO: verify exact dtype support from cube_pto.h
  source: "opcode.cpp:622 RegisterCube"

