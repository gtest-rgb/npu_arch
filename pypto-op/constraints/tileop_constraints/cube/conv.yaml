# =============================================================================
# OP_L1_COPY_IN_CONV: GM -> L1 copy for convolution feature map
# =============================================================================

OP_L1_COPY_IN_CONV:
  description: "卷积feature map从GM搬运到L1"
  calc_type: MOVE_IN
  core_type: AIC
  tileop: "TileOp::L1CopyInConv"
  pipe: [PIPE_MTE2, PIPE_MTE2]
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: null
  operands:
    input:
      mem_type: [GM]
      layout:
        type: "ND格式"
        contiguous: false
        max_dims: 4
      stride:
        required: false
        constraints: []
      alignment:
        address: 32
        scope: "首地址"
      shape:
        min_elements: 1
    output:
      mem_type: [L1]
      layout:
        type: "ND格式"
        contiguous: true
        max_dims: 4
      stride:
        required: false
        constraints: []
      alignment:
        address: 32
        scope: "首地址"
  hardware:
    block_size: 32
  tile_shape:
    api: "set_cube_tile_shapes"
    constraints:
      - rule: "搬运数据量不超过 L1 容量"
        severity: error
        tileop_cause: "L1 物理容量限制"
    recommended:
      - scenario: "通用场景"
        value: "按 feature map 的 N*H*W 维度设置"
        reasoning: "每次搬运一个完整的 feature map slice 到 L1"
  tags: []
  notes: |
    - MTE2 流水线，负责将 feature map 从 GM 搬运到 L1
    - 与通用 OP_L1_COPY_IN 的区别：针对 conv 的 ND 格式做了优化
    - GM 首地址需要 32B 对齐
    - 属于 IsCopyIn 操作
  source: "opcode.cpp:630 RegisterCube"

# =============================================================================
# OP_LOAD3D_CONV: L1 -> L0A (img2col / 3D feature loading)
# =============================================================================

OP_LOAD3D_CONV:
  description: "将L1中的feature map通过img2col方式加载到L0A"
  calc_type: MOVE_LOCAL
  core_type: AIC
  tileop: "TileOp::TLoad3D"
  pipe: [PIPE_MTE1, PIPE_MTE1]
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: null
  operands:
    input:
      mem_type: [L1]
      layout:
        type: "ND格式"
        contiguous: true
        max_dims: 4
      stride:
        required: false
        constraints: []
      alignment:
        address: 32
        scope: "首地址"
      shape:
        min_elements: 1
    output:
      mem_type: [L0A]
      layout:
        type: "NZ格式（img2col展开后）"
        contiguous: true
        max_dims: 2
      stride:
        required: false
        constraints: []
      alignment:
        address: 32
        scope: "首地址"
  hardware:
    block_size: 32
    base_block_m: 16
    base_block_k: 16
  tile_shape:
    api: "set_cube_tile_shapes"
    constraints:
      - rule: "输出 NZ 格式 M 维 (H*W) % 16 == 0"
        severity: error
        tileop_cause: "BLOCK_CUBE_M_N=16，NZ 格式基本块大小"
      - rule: "输出 NZ 格式 K 维 (Cin) % 16 == 0"
        severity: error
        tileop_cause: "L0A 加载粒度"
      - rule: "输出数据量 <= L0A 容量"
        severity: error
        tileop_cause: "L0A 物理容量（A3: 1MB）"
    recommended:
      - scenario: "通用 Conv2D"
        value: "M = ceil_align(H*W, 16), K = ceil_align(Cin, 16)"
        reasoning: "img2col 后 M=H*W, K=Cin*Kh*Kw，需按 16 对齐"
  tags: []
  notes: |
    - MTE1 流水线，L1 -> L0A
    - 将 4D feature map [N, Cin, H, W] 通过 img2col 展开
    - 展开 3x3 conv 时：M = H_out * W_out, K = Cin * Kh * Kw
    - 展开后的数据以 NZ 格式存入 L0A
    - OP_CONV pipeline 中的 feature map 加载阶段
  source: "opcode.cpp:632 RegisterCube"

