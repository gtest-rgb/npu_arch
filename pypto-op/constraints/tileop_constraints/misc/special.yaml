# Special Purpose Operations: Concat, CumSum, OneHot, Pad, etc.
# Source: framework/src/interface/operation/opcode.cpp
#   RegisterVector()  (lines 449-557)
#   RegisterVectorBinary()  OP_MODS (line 233), OP_EXPANDEXPDIF (line 238)
#   RegisterVectorUnary()  OP_PAD (line 263)
#   RegisterCommon()  OP_BRCB (indirect via RegisterVector)
#
# Note: OP_EXPANDEXPDIF is in view/expand.yaml (BINARY_OPS set)
# Note: OP_GATHER_FROM_UB is in vector/gather_scatter.yaml (already documented)

OP_CONCAT:
  description: "张量拼接（沿指定轴拼接多个张量）"
  calc_type: ELMWISE
  core_type: AIV
  tileop: "TileOp::Tconcat"
  pipe: [PIPE_V, PIPE_V]
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: null
  operands:
    input:
      mem_type: [UB]
      layout:
        type: "任意"
        contiguous: false
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
    output:
      mem_type: [UB]
      layout:
        type: "与输入一致"
        contiguous: false
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
  hardware:
    mask_len: 64
    repeat_max: 255
    block_size: 32
    elements_per_block:
      fp16: 16
      bf16: 16
      fp32: 8
  tile_shape:
    api: "set_vec_tile_shapes"
    constraints:
      - rule: "末尾轴大小 * element_size % 32 == 0"
        severity: error
        tileop_cause: "Vector指令要求每次读取的字节数为32的整数倍"
    recommended:
      - scenario: "通常计算"
        value: "末尾轴对齐到256Bytes"
        reasoning: "充分利用UB带宽"
  tags: []
  notes: |
    - 有concat、inputCombineAxis、outputCombineAxis属性
    - 无TileShapeVerifier验证
    - 不在UNSUPPORT_BF16_OPS中，支持bf16
  source: "opcode.cpp:452 RegisterVector"

