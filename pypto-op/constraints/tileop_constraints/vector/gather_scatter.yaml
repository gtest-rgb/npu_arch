OP_GATHER:
  description: "从DDR按索引收集元素到UB（支持任意索引访问模式）"
  calc_type: OTHER
  core_type: ANY
  tileop: "TileOp::Tgather"
  pipe: [PIPE_S, PIPE_MTE2]
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: null
  operands:
    input:
      mem_type: [MEM_DEVICE_DDR]
      layout:
        type: "连续存储"
        contiguous: true
        max_dims: null
      stride:
        required: false
        constraints: []
      alignment:
        address: "32字节对齐"
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
    index:
      mem_type: [MEM_DEVICE_DDR]
      layout:
        type: "1D索引张量"
        contiguous: true
        max_dims: 1
      stride:
        required: false
        constraints: ["索引值范围不超过输入张量对应维度大小"]
      alignment:
        address: "32字节对齐"
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
    output:
      mem_type: [UB]
      layout:
        type: "1D输出"
        contiguous: true
        max_dims: 1
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
  hardware:
    mask_len: 64
    repeat_max: 255
    block_size: 32
    elements_per_block:
      fp16: 16
      bf16: 16
      fp32: 8
  tile_shape:
    api: "set_vec_tile_shapes"
    constraints:
      - rule: "输出大小 * element_size % 32 == 0"
        severity: error
        tileop_cause: "Vector/MTE指令要求每次读取的字节数为32的整数倍"
    recommended:
      - scenario: "随机访问"
        value: "输出对齐到256Bytes"
        reasoning: "充分利用UB带宽"
  tags: [GATHER_OPS, SUPPORT_DYNAMIC_UNALIGNED_OPS]
  notes: |
    - 随机访问模式，无连续内存优势
    - 输入在DDR，索引在DDR，输出到UB
    - 使用PIPE_S和PIPE_MTE2流水线
    - 有TileShapeVerifier验证
    - 属于SUPPORT_DYNAMIC_UNALIGNED_OPS
    - 不在UNSUPPORT_BF16_OPS中，支持bf16
  source: "opcode.cpp:464 RegisterVector"

