#                     OP_WHERE_ST (line 541), OP_WHERE_SS (line 544)

# =============================================================================
# Logical NOT (unary, calc_type=ELMWISE)
# =============================================================================

OP_LOGICALNOT:
  description: "张量逐元素逻辑非"
  calc_type: ELMWISE
  core_type: AIV
  tileop: "TileOp::TlogicalNot"
  pipe: [PIPE_V, PIPE_V]
  dtype:
    fp16: supported
    bf16: unsupported
    fp32: supported
    int8: null
  operands:
    input:
      mem_type: [UB]
      layout:
        type: "任意"
        contiguous: false
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
    output:
      mem_type: [UB]
      layout:
        type: "与输入一致"
        contiguous: false
        max_dims: 5
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
  hardware:
    mask_len: 64
    repeat_max: 255
    block_size: 32
    elements_per_block:
      fp16: 16
      bf16: 16
      fp32: 8
  tile_shape:
    api: "set_vec_tile_shapes"
    constraints:
      - rule: "末尾轴大小 * element_size % 32 == 0"
        severity: error
        tileop_cause: "Vector指令要求每次读取的字节数为32的整数倍"
    recommended:
      - scenario: "通常计算"
        value: "末尾轴对齐到256Bytes"
        reasoning: "充分利用UB带宽"
  tags: [LOGICALNOT_OPS, UNSUPPORT_BF16_OPS, SUPPORT_DYNAMIC_UNALIGNED_OPS]
  notes: |
    - 输出布尔类型张量
    - 无额外属性要求
    - 有TileShapeVerifier验证
    - 属于SUPPORT_DYNAMIC_UNALIGNED_OPS
    - 在UNSUPPORT_BF16_OPS中，不支持bf16
  source: "opcode.cpp:430 RegisterVector"

