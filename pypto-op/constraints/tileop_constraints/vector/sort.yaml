OP_SORT:
  description: "并行排序（in-place排序，三输出缓冲区）"
  calc_type: OTHER
  core_type: AIV
  tileop: "TileOp::Sort"
  pipe: [PIPE_V, PIPE_V]
  dtype:
    fp16: supported
    bf16: supported
    fp32: supported
    int8: null
  operands:
    input:
      mem_type: [UB]
      layout:
        type: "1D连续"
        contiguous: true
        max_dims: 1
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
    output:
      mem_type: [UB]
      layout:
        type: "1D连续（三缓冲区交换）"
        contiguous: true
        max_dims: 1
      stride:
        required: false
        constraints: []
      alignment:
        address: null
        scope: null
      shape:
        min_elements: 1
        max_elements_per_dim: null
  hardware:
    mask_len: 64
    repeat_max: 255
    block_size: 32
    elements_per_block:
      fp16: 16
      bf16: 16
      fp32: 8
  tile_shape:
    api: "set_vec_tile_shapes"
    constraints:
      - rule: "输入大小 * element_size % 32 == 0"
        severity: error
        tileop_cause: "Vector指令要求每次读取的字节数为32的整数倍"
      - rule: "需要三个等大输出缓冲区"
        severity: error
        tileop_cause: "Sort使用三缓冲区交换实现"
    recommended:
      - scenario: "并行排序"
        value: "输入对齐到256Bytes"
        reasoning: "充分利用UB带宽，排序需要三倍缓冲区空间"
  tags: [LASTUSE_OPS, SUPPORT_DYNAMIC_UNALIGNED_OPS]
  notes: |
    - in-place排序，有inplaceInfo属性
    - 需要三个等大的输出缓冲区用于交换
    - 有start_index属性控制起始位置
    - 有order属性控制排序顺序（升序/降序）
    - 属于SUPPORT_DYNAMIC_UNALIGNED_OPS
    - 不在UNSUPPORT_BF16_OPS中，支持bf16
    - 配合COMPARE_SWAP和MERGE完成完整并行排序
  source: "opcode.cpp:336 RegisterVectorSort"

